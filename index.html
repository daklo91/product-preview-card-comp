<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      :root {
        /* Primary */
        --primary-green-500: hsl(158, 36%, 37%);
        --primary-green-700: hsl(158, 42%, 18%);

        /* Neutral */
        --neutral-black: hsl(212, 21%, 14%);
        --neutral-grey: hsl(228, 12%, 48%);
        --neutral-cream: hsl(30, 38%, 92%);
        --neutral-white: hsl(0, 0%, 100%);
      }

      @font-face {
        font-family: "Montserrat";
        src: url("fonts/Montserrat/static/Montserrat-Medium.ttf")
          format("truetype");
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: "Montserrat";
        src: url("fonts/Montserrat/static/Montserrat-Bold.ttf")
          format("truetype");
        font-weight: 700;
        font-style: normal;
      }

      @font-face {
        font-family: "Fraunces";
        src: url("fonts/Fraunces/static/Fraunces_72pt-Bold.ttf")
          format("truetype");
        font-weight: 700;
        font-style: normal;
      }

      body {
        background-color: var(--neutral-cream);
      }

      .category-text {
        color: var(--neutral-grey);
      }

      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <article>
      <picture>
        <source
          media="(min-width: 800px)"
          srcset="./images/image-product-desktop.jpg"
        />
        <source
          media="(min-width: 480px)"
          srcset="./images/image-product-mobile.jpg"
        />
        <img
          src="./images/image-product-mobile.jpg"
          alt="Gabrielle Chanel Paris Perfume"
        />
      </picture>
      <p class="category-text">Perfume</p>
      <h2>Gabrielle Essence Eau De Parfum</h2>
      <p>
        A floral, solar and voluptuous interpretation composed by Olivier Polge,
        Perfumer-Creator for the House of CHANEL.
      </p>
      <p><span>$149.99 </span><span>$169.99</span></p>
      <button>Add to Cart</button>
    </article>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
