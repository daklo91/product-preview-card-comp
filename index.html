<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      :root {
        /* Primary */
        --primary-green-500: hsl(158, 36%, 37%);
        --primary-green-700: hsl(158, 42%, 18%);

        /* Neutral */
        --neutral-black: hsl(212, 21%, 14%);
        --neutral-grey: hsl(228, 12%, 48%);
        --neutral-cream: hsl(30, 38%, 92%);
        --neutral-white: hsl(0, 0%, 100%);
      }

      @font-face {
        font-family: "Montserrat";
        src: url("fonts/Montserrat/static/Montserrat-Medium.ttf")
          format("truetype");
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: "Montserrat";
        src: url("fonts/Montserrat/static/Montserrat-Bold.ttf")
          format("truetype");
        font-weight: 700;
        font-style: normal;
      }

      @font-face {
        font-family: "Fraunces";
        src: url("fonts/Fraunces/static/Fraunces_72pt-Bold.ttf")
          format("truetype");
        font-weight: 700;
        font-style: normal;
      }

      body {
        background-color: var(--neutral-cream);
        display: flex;
        justify-content: center;
        padding-top: 150px;
      }

      .product-card {
        font-size: 14px;
        background-color: var(--neutral-white);
        max-width: 375px;
        border-radius: 8px;
      }

      .product-card-content {
        padding: 30px;
        width: 100%;
        box-sizing: border-box;
      }

      .product-image > img {
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
        width: 100%;
      }

      .category-text {
        font-family: "Montserrat";
        font-weight: 500;
        color: var(--neutral-grey);
        text-transform: uppercase;
        letter-spacing: 4px;
      }

      .product-headline {
        font-family: "Fraunces";
        font-weight: 700;
        color: var(--neutral-black);
        font-size: 32px;
      }

      .product-description {
        font-family: "Montserrat";
        font-weight: 500;
        color: var(--neutral-grey);
      }

      .price {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .price-now {
        font-family: "Fraunces";
        font-weight: 700;
        color: var(--primary-green-500);
        font-size: 28px;
      }
      .price-before {
        font-family: "Montserrat";
        font-weight: 500;
        color: var(--neutral-grey);
        text-decoration: line-through;
      }

      .product-CTA {
        font-family: "Montserrat";
        font-weight: 700;
        color: var(--neutral-white);
        background-color: var(--primary-green-500);
        border: 0;
        padding: 16px;
        width: 100%;
        display: flex;
        gap: 8px;
        justify-content: center;
        cursor: pointer;
        border-radius: 8px;
      }

      .product-CTA:hover {
        background-color: var(--primary-green-700);
      }

      @media (min-width: 800px) {
        .product-card {
          display: flex;
          max-width: 700px;
        }

        .product-card-content {
          padding: 40px;
        }

        .product-image > img {
          width: 350px;
          border-top-right-radius: 0;
          border-bottom-left-radius: 8px;
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <article class="product-card">
      <picture class="product-image">
        <source
          media="(min-width: 800px)"
          srcset="./images/image-product-desktop.jpg"
        />
        <source
          media="(min-width: 480px)"
          srcset="./images/image-product-mobile.jpg"
        />
        <img
          src="./images/image-product-mobile.jpg"
          alt="Gabrielle Chanel Paris Perfume"
        />
      </picture>
      <div class="product-card-content">
        <p class="category-text">Perfume</p>
        <h2 class="product-headline">Gabrielle Essence Eau De Parfum</h2>
        <p class="product-description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <p class="price">
          <span class="price-now">$149.99 </span
          ><span class="price-before">$169.99</span>
        </p>
        <button class="product-CTA">
          <img src="./images/icon-cart.svg" alt="" /> Add to Cart
        </button>
      </div>
    </article>
  </body>
</html>
